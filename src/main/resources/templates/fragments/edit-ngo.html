<section th:fragment="editNgo" id="editNgoSection" class="dashboard-section space-y-8 animate-fade-in pb-12">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-emerald-600 rounded-2xl flex items-center justify-center text-white shadow-xl">
                    <i class="fas fa-heart text-2xl"></i>
                </div>
                <div>
                    <h3 class="text-3xl font-black text-slate-900">Lead NGO Details</h3>
                    <p class="text-slate-500">Modify partner organization credentials and capacity.</p>
                </div>
            </div>
            <button onclick="showSection('ngoTable')" class="text-slate-400 hover:text-red-500 transition-all text-3xl">
                <i class="fas fa-times-circle"></i>
            </button>
        </div>

        <form th:action="@{/admin/api/ngo/update}" id="editNgoForm" class="fb-card p-8 md:p-12 space-y-10" th:object="${ngo}">
            <input type="hidden" name="id" th:value="*{id}">

            <section>
                <div class="form-section-title"><i class="fas fa-id-card"></i> Organization Identity</div>
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="input-group md:col-span-2"><label>NGO Full Legal Name</label><input type="text" th:field="*{ngoName}" name="ngoName" required></div>
                    <div class="input-group"><label>Registration Number</label><input type="text" th:field="*{registrationNumber}" name="registrationNumber" required></div>
                    <div class="input-group"><label>NGO Type</label>
                        <select th:field="*{ngoType}" name="ngoType" required>
                            <option value="charity">Registered Charity</option>
                            <option value="foundation">Non-Profit Foundation</option>
                            <option value="enterprise">Social Enterprise</option>
                            <option value="trust">Religious Trust</option>
                        </select>
                    </div>
                </div>
            </section>

            <section>
                <div class="form-section-title"><i class="fas fa-key"></i> Login & Contact</div>
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="input-group"><label>Official Email</label><input type="email" th:field="*{email}" name="email" required></div>
                    <div class="input-group"><label>New Password (Optional)</label><input type="password" name="password" placeholder="••••••••"></div>
                    <div class="input-group"><label>Contact Person</label><input type="text" th:field="*{contactPerson}" name="contactPerson" required></div>
                    <div class="input-group"><label>Mobile Number</label><input type="tel" th:field="*{mobile}" name="mobile" required></div>
                    <div class="input-group"><label>Capacity (Persons)</label><input type="number" th:field="*{capacity}" name="capacity" required></div>
                </div>
            </section>

            <section>
                <div class="form-section-title"><i class="fas fa-map-marker-alt"></i> Contact & Location</div>
                <div class="input-group"><label>Headquarters Address</label><textarea th:field="*{address}" name="address" rows="3" required></textarea></div>
                <div class="grid md:grid-cols-2 gap-6 mt-6">
                    <div class="input-group"><label>City</label><input type="text" th:field="*{city}" name="city" required></div>
                    <div class="input-group"><label>Pincode</label><input type="text" th:field="*{pincode}" name="pincode" required></div>
                </div>

                <div id="ngoMap"></div>

                <div class="mt-6 flex flex-wrap gap-4 items-center bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-sm">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Live Data</span>
                    <input type="hidden" th:field="*{latitude}" id="n_lat" name="latitude">
                    <input type="hidden" th:field="*{longitude}" id="n_lng" name="longitude">
                    <div class="coordinate-badge">Lat: <span id="nLatDisp" th:text="*{latitude}">--.----</span></div>
                    <div class="coordinate-badge">Lng: <span id="nLngDisp" th:text="*{longitude}">--.----</span></div>
                </div>
            </section>

        </form>
    </div>
</section>
