<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success</title>

    <style>

        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg,#4f46e5,#06b6d4);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            padding:40px 50px;
            border-radius:12px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            max-width:400px;
            width:100%;
        }

        .icon{
            font-size:60px;
            color:#22c55e;
        }

        h1{
            margin-top:15px;
            color:#111827;
        }

        p{
            color:#6b7280;
            font-size:15px;
            margin-bottom:25px;
        }

        button{
            background:#4f46e5;
            color:white;
            border:none;
            padding:12px 25px;
            font-size:16px;
            border-radius:6px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#3730a3;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="icon">✔</div>

    <h1>Registration Successful</h1>

    <p>Your account has been created successfully. You can now login and continue.</p>

    <button onclick="window.location.href='/login'">
        Go to Login
    </button>

</div>

</body>
</html>
