<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Food Rescue AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --primary-light: rgba(16, 185, 129, 0.1);
            --dark: #0f172a;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-400: #94a3b8;
            --slate-500: #64748b;
            --slate-600: #475569;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, rgba(16, 185, 129, 0.08), transparent),
            radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.05), var(--slate-50));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: var(--dark);
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 440px;
            padding: 2.5rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--slate-100);
            animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-logo {
            width: 64px;
            height: 64px;
            background: var(--primary);
            color: white;
            border-radius: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--slate-600);
            margin-bottom: 0.6rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        input {
            width: 100%;
            padding: 0.875rem 1.25rem;
            background: var(--slate-50);
            border: 1px solid var(--slate-200);
            border-radius: 1rem;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--dark);
        }

        .password-input input {
            padding-right: 3.5rem;
        }

        input::placeholder {
            color: var(--slate-400);
            opacity: 0.6;
        }

        input:focus {
            outline: none;
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        /* Password Toggle Eye Icon remains for functionality */
        .password-toggle {
            position: absolute;
            right: 1.15rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--slate-400);
            cursor: pointer;
            transition: color 0.2s;
            font-size: 0.9rem;
            z-index: 11;
            padding: 8px;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 1rem;
            border-radius: 1rem;
            font-weight: 800;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(16, 185, 129, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
            color: var(--slate-400);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--slate-200);
        }

        .divider span { padding: 0 1rem; }

        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .social-btn {
            background: white;
            border: 1px solid var(--slate-200);
            padding: 0.75rem;
            border-radius: 0.875rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--slate-600);
            transition: all 0.2s;
            cursor: pointer;
        }

        .social-btn:hover { background: var(--slate-50); border-color: var(--slate-300); }

        .footer-text {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.85rem;
            color: var(--slate-500);
        }

        .footer-text a { color: var(--primary); font-weight: 700; text-decoration: none; }
        .footer-text a:hover { text-decoration: underline; }

        .status-msg {
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
            background: #fff1f2;
            color: #e11d48;
            border: 1px solid #ffe4e6;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-logo">
        <i class="fas fa-hand-holding-heart"></i>
    </div>

    <div class="text-center mb-8">
        <h1 class="text-2xl font-extrabold text-slate-900">Welcome back</h1>
        <p class="text-slate-500 font-medium mt-1">Sign in to Food Rescue AI</p>
    </div>

    <div id="errorMsg" class="status-msg">
        <i class="fas fa-exclamation-circle"></i>
        <span>Invalid email or password.</span>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <!-- Email Field -->
        <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
                <input type="email" id="email" placeholder="admin@ngo.org" required>
            </div>
        </div>

        <!-- Password Field -->
        <div class="form-group">
            <div class="flex justify-between items-center mb-2">
                <label class="mb-0">Password</label>
                <a href="#" class="text-xs font-bold text-emerald-600 hover:underline">Forgot password?</a>
            </div>
            <div class="input-wrapper password-input">
                <input type="password" id="password" placeholder="••••••••" required>
                <i class="fas fa-eye password-toggle" onclick="togglePassword()"></i>
            </div>
        </div>

        <div class="flex items-center gap-2 mt-4">
            <input type="checkbox" id="remember" class="w-4 h-4 accent-emerald-600 rounded">
            <label for="remember" class="mb-0 cursor-pointer text-xs font-semibold text-slate-600">Keep me signed in</label>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
            <span>Sign In</span>
            <i class="fas fa-arrow-right"></i>
        </button>
    </form>

    <div class="divider">
        <span>Or continue with</span>
    </div>

    <div class="social-grid">
        <button class="social-btn">
            <i class="fab fa-google text-red-500"></i>
            Google
        </button>
        <button class="social-btn">
            <i class="fab fa-github"></i>
            GitHub
        </button>
    </div>

    <p class="footer-text">
        Don't have an account? <a href="#">Create account</a>
    </p>
</div>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.querySelector('.password-toggle');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const btnText = btn.querySelector('span');
        const errorMsg = document.getElementById('errorMsg');

        btn.disabled = true;
        btn.style.opacity = '0.7';
        btnText.innerText = 'Verifying...';
        errorMsg.style.display = 'none';

        setTimeout(() => {
            const email = document.getElementById('email').value;
            if (email === "error@example.com") {
                errorMsg.style.display = 'flex';
                btn.disabled = false;
                btn.style.opacity = '1';
                btnText.innerText = 'Sign In';
            } else {
                alert("Login Successful! Transitioning to your dashboard...");
            }
        }, 1200);
    }
</script>
</body>
</html>
