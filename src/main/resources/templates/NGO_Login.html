<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGO Login | FoodBridge AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- INTERNAL CSS -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --dark: #0f172a;
            --slate-100: #f1f5f9;
            --slate-500: #64748b;
            --glass: rgba(255, 255, 255, 0.9);
            --radius: 1.25rem;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, rgba(16, 185, 129, 0.1), transparent),
            radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.05), #f8fafc);
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 450px;
            padding: 3rem;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--slate-500);
            margin-bottom: 0.6rem;
            margin-left: 0.25rem;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            /* Standard padding now that icons are removed */
            padding: 0.875rem 1.25rem;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        input::placeholder {
            color: #94a3b8;
            opacity: 0.8;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .fb-btn-login {
            background: var(--primary);
            color: white;
            padding: 1rem;
            width: 100%;
            border-radius: 1rem;
            font-weight: 800;
            font-size: 1rem;
            transition: all 0.3s;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
            margin-top: 1rem;
        }

        .fb-btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(16, 185, 129, 0.4);
        }

        .fb-btn-login:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--slate-400);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 2rem 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--slate-100);
        }

        .divider:not(:empty)::before { margin-right: 1rem; }
        .divider:not(:empty)::after { margin-left: 1rem; }

        .brand-logo {
            width: 56px;
            height: 56px;
            background: var(--primary);
            border-radius: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            margin: 0 auto 1.5rem;
            box-shadow: 0 12px 20px -5px rgba(16, 185, 129, 0.4);
        }

        .error-alert {
            background: #fef2f2;
            border: 1px solid #fee2e2;
            color: #ef4444;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
    </style>
</head>
<body>

<div class="login-card">
    <!-- Branding -->
    <div class="text-center mb-8">
        <div class="brand-logo">
            <i class="fas fa-heart"></i>
        </div>
        <h1 class="text-3xl font-black tracking-tight text-slate-900">NGO Login</h1>
        <p class="text-slate-400 font-medium text-sm mt-1">Enter your credentials to access the bridge</p>
    </div>

    <!-- Error Handling for Login -->
    <div th:if="${param.error}" class="error-alert">
        <i class="fas fa-exclamation-circle"></i>
        Invalid email or password.
    </div>

    <div th:if="${param.logout}" class="bg-emerald-50 border border-emerald-100 text-emerald-600 p-3 rounded-xl text-sm font-bold mb-6 flex items-center gap-2">
        <i class="fas fa-check-circle"></i>
        Logged out successfully.
    </div>

    <!-- Login Form -->
    <form th:action="@{/auth/NGOLogin}" method="post">
        <div class="input-group">
            <label>Official Email</label>
            <div class="input-wrapper">
                <input type="email" name="email" placeholder="admin@ngo.org" required autofocus>
            </div>
        </div>

        <div class="input-group">
            <div class="flex justify-between items-center mb-0">
                <label>Password</label>
                <a href="#" class="text-[10px] font-black text-emerald-600 uppercase tracking-widest hover:underline mb-2">Forgot?</a>
            </div>
            <div class="input-wrapper">
                <input type="password" name="password" id="passwordField" placeholder="••••••••" required>
            </div>
        </div>

        <div class="flex items-center gap-2 mb-6 ml-1">
            <input type="checkbox" id="remember" name="remember-me" class="w-4 h-4 rounded border-slate-200 text-emerald-600 focus:ring-emerald-500 cursor-pointer">
            <label for="remember" class="text-xs font-bold text-slate-500 cursor-pointer select-none">Remember this organization</label>
        </div>

        <button type="submit" class="fb-btn-login">
            Access Dashboard <i class="fas fa-arrow-right ml-2 text-sm"></i>
        </button>
    </form>

    <div class="divider">or</div>

    <div class="text-center">
        <p class="text-slate-500 text-sm font-medium">
            Not a registered partner?
            <a th:href="@{/register/ngo}" class="text-emerald-600 font-black hover:underline block mt-2">
                Join the Mission <i class="fas fa-plus-circle ml-1"></i>
            </a>
        </p>
    </div>
</div>

<!-- Background Decoration -->
<div class="fixed -z-10 top-0 left-0 w-full h-full overflow-hidden opacity-30 pointer-events-none">
    <div class="absolute top-10 left-10 w-64 h-64 bg-emerald-300 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-10 right-10 w-96 h-96 bg-blue-300 rounded-full blur-[120px]"></div>
</div>

<script>
    // Simple script to handle visual feedback
    const form = document.querySelector('form');
    form.addEventListener('submit', (e) => {
        // Prevent double submission visually
        const btn = document.querySelector('.fb-btn-login');
        btn.innerHTML = '<i class="fas fa-circle-notch animate-spin mr-2"></i> Verifying...';
        btn.style.opacity = '0.7';
        btn.style.pointerEvents = 'none';
    });
</script>
</body>
</html>
