<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Food Bridge AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .role-option input:checked + label {
            border-color: #10b981;
            background-color: #f0fdf4;
            color: #059669;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.1);
        }

        .role-check {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s ease;
        }

        .role-option input:checked + label .role-check {
            opacity: 1;
            transform: scale(1);
        }

        .animate-slide-up {
            animation: slideUp 0.4s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Admin Secret Mode Styles */
        .admin-active {
            border-color: #6366f1 !important;
            box-shadow: 0 25px 50px -12px rgba(99, 102, 241, 0.2) !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="max-w-md w-full animate-slide-up">
    <div class="text-center mb-8">
        <!-- Secret Trigger: Clicking the heart icon toggles Admin Portal -->
        <div id="logoBadge" onclick="toggleAdminLogin()" class="w-16 h-16 bg-emerald-600 rounded-2xl flex items-center justify-center text-white shadow-xl mx-auto mb-4 cursor-pointer hover:scale-110 transition-all duration-300">
            <i id="logoIcon" class="fas fa-hand-holding-heart text-2xl"></i>
        </div>
        <h1 id="mainTitle" class="text-3xl font-black text-slate-900 tracking-tight">FoodBridge<span id="titleAccent" class="text-emerald-600">AI</span></h1>
        <p id="subTitle" class="text-slate-500 text-sm font-medium mt-2">Connecting surplus to those in need.</p>
    </div>

    <!-- Support for Controller Model Attribute model.addAttribute("error", "...") -->
    <div th:if="${error}" class="mb-4 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 rounded-xl animate-slide-up">
        <div class="flex items-center gap-2">
            <i class="fas fa-exclamation-circle text-red-500"></i>
            <p class="text-xs font-bold" th:text="${error}">Error Message</p>
        </div>
    </div>

    <!-- Support for URL Query Param logout=true -->
    <div th:if="${param.logout}" class="mb-4 p-4 bg-emerald-50 border-l-4 border-emerald-500 text-emerald-700 rounded-xl animate-slide-up">
        <div class="flex items-center gap-2">
            <i class="fas fa-info-circle text-emerald-500"></i>
            <p class="text-xs font-bold">You have been logged out successfully.</p>
        </div>
    </div>

    <div class="glass-card rounded-[2.5rem] p-8 shadow-2xl transition-all duration-500" id="loginCard">

        <!-- Standard User Login Form (Donor/NGO) -->
        <div id="userLoginForm">
            <form th:action="@{/auth/loginuser}" method="POST" class="space-y-6">

                <div class="space-y-3">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Account Type</label>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="role-option">
                            <input type="radio" name="role" id="roleDonor" value="Donor" class="hidden"
                                   th:checked="${role == 'Donor' or param.role == null or param.role[0] == 'Donor'}">
                            <label for="roleDonor" class="relative flex flex-col items-center justify-center p-4 rounded-2xl border-2 border-slate-100 cursor-pointer transition-all hover:border-emerald-200">
                                <div class="role-check text-emerald-600"><i class="fas fa-check-circle"></i></div>
                                <i class="fas fa-utensils text-lg mb-1"></i>
                                <span class="text-xs font-bold">Donor</span>
                            </label>
                        </div>
                        <div class="role-option">
                            <input type="radio" name="role" id="roleNGO" value="NGO" class="hidden"
                                   th:checked="${role == 'NGO' or (param.role != null and param.role[0] == 'NGO')}">
                            <label for="roleNGO" class="relative flex flex-col items-center justify-center p-4 rounded-2xl border-2 border-slate-100 cursor-pointer transition-all hover:border-emerald-200">
                                <div class="role-check text-emerald-600"><i class="fas fa-check-circle"></i></div>
                                <i class="fas fa-handshake-angle text-lg mb-1"></i>
                                <span class="text-xs font-bold">NGO</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 ml-1">Email Address</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                            <input type="email" name="email" required placeholder="name@email.com" class="w-full pl-11 pr-4 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 focus:outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 transition-all font-medium text-sm">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between items-center ml-1">
                            <label class="text-xs font-bold text-slate-500">Password</label>
                            <a th:href="@{/forgot-password}" class="text-[10px] font-bold text-emerald-600 hover:underline">Forgot?</a>
                        </div>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                            <input type="password" name="password" required placeholder="••••••••" class="w-full pl-11 pr-4 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 focus:outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 transition-all font-medium text-sm">
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-emerald-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-emerald-200 hover:bg-emerald-700 hover:-translate-y-0.5 transition-all duration-200">
                    Sign In
                </button>

                <p class="text-center text-xs font-bold text-slate-400 mt-6">
                    Don't have an account?
                    <a th:href="@{/register/donor}" id="signupLink" class="text-emerald-600 hover:underline transition-colors">Create one</a>
                </p>
            </form>
        </div>

        <!-- Secret Admin Login Form -->
        <div id="adminLoginForm" class="hidden">
            <form th:action="@{/auth/loginuser}" method="POST" class="space-y-6">
                <!-- Controller specific role for Admin -->
                <input type="hidden" name="role" value="ADMIN">

                <div class="text-center mb-6">
                    <span class="bg-indigo-100 text-indigo-700 text-[10px] font-black uppercase px-3 py-1 rounded-full tracking-widest">Admin Authorization</span>
                </div>

                <div class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 ml-1">Administrator Email</label>
                        <div class="relative">
                            <i class="fas fa-user-shield absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                            <input type="email" name="email" required placeholder="admin@foodbridge.ai" class="w-full pl-11 pr-4 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all font-medium text-sm">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 ml-1">Security Password</label>
                        <div class="relative">
                            <i class="fas fa-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                            <input type="password" name="password" required placeholder="••••••••" class="w-full pl-11 pr-4 py-3.5 rounded-2xl bg-slate-50 border border-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all font-medium text-sm">
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-0.5 transition-all duration-200">
                    Access Console
                </button>

                <button type="button" onclick="toggleAdminLogin()" class="w-full text-center text-xs font-bold text-slate-400 hover:text-slate-600 mt-4 transition-colors">
                    <i class="fas fa-arrow-left mr-1"></i> Back to User Login
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    /**
     * Secret Admin Toggle Logic
     * Triggered by clicking the main Heart Logo
     */
    let isAdminView = false;
    function toggleAdminLogin() {
        isAdminView = !isAdminView;

        const userForm = document.getElementById('userLoginForm');
        const adminForm = document.getElementById('adminLoginForm');
        const card = document.getElementById('loginCard');
        const logoBadge = document.getElementById('logoBadge');
        const logoIcon = document.getElementById('logoIcon');
        const titleAccent = document.getElementById('titleAccent');
        const subTitle = document.getElementById('subTitle');

        if (isAdminView) {
            userForm.classList.add('hidden');
            adminForm.classList.remove('hidden');
            logoBadge.classList.replace('bg-emerald-600', 'bg-indigo-600');
            logoIcon.classList.replace('fa-hand-holding-heart', 'fa-shield-halved');
            titleAccent.classList.replace('text-emerald-600', 'text-indigo-600');
            subTitle.innerText = "Authorized personnel only.";
            card.classList.add('admin-active');
        } else {
            userForm.classList.remove('hidden');
            adminForm.classList.add('hidden');
            logoBadge.classList.replace('bg-indigo-600', 'bg-emerald-600');
            logoIcon.classList.replace('fa-shield-halved', 'fa-hand-holding-heart');
            titleAccent.classList.replace('text-indigo-600', 'text-emerald-600');
            subTitle.innerText = "Connecting surplus to those in need.";
            card.classList.remove('admin-active');
        }
    }

    /**
     * Dynamic Logic for Role Handling (Signup URL updates)
     */
    const signupLink = document.getElementById('signupLink');
    const roleInputs = document.querySelectorAll('input[name="role"]');

    const syncRoleData = () => {
        const checkedInput = document.querySelector('input[name="role"]:checked');
        if (!checkedInput) return;

        const selectedRole = checkedInput.value;

        if (selectedRole === 'Donor') {
            signupLink.href = "/register/donor";
            signupLink.classList.remove('text-blue-600');
            signupLink.classList.add('text-emerald-600');
        } else {
            signupLink.href = "/register/ngo";
            signupLink.classList.remove('text-emerald-600');
            signupLink.classList.add('text-blue-600');
        }
    };

    roleInputs.forEach(input => input.addEventListener('change', syncRoleData));
    syncRoleData();
</script>
</body>
</html>
